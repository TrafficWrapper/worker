services:
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    env_file: .env
    environment:
      WORKER_STATE_DIR: /worker-state
      AWG_UAPI_SOCKET: /var/run/wireguard/awg1.sock
      XRAY_CONTAINER_NAME: ${XRAY_CONTAINER_NAME:-worker-xray-1}
      DOCKER_SOCKET: /var/run/docker.sock
    volumes:
      - ./worker-state:/worker-state
      - awg-run:/var/run/wireguard
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:${AGENT_PORT:-9090}:9090/tcp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/worker-agent", "self-describe"]
      interval: 10s
      timeout: 5s
      retries: 12

  awg-gw:
    build:
      context: .
      dockerfile: awg-gw/Dockerfile
    depends_on:
      agent:
        condition: service_healthy
    command: ["run", "--config", "/worker-state/awg/awg-gw.json"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      net.ipv4.ip_forward: "1"
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file: .env
    volumes:
      - ./worker-state:/worker-state
      - awg-run:/var/run/wireguard
    ports:
      - "${AWG_PORT:-51888}:51821/udp"
    restart: unless-stopped

  distributor:
    build:
      context: distributor
    depends_on:
      - awg-gw
    network_mode: "service:awg-gw"
    env_file: .env
    environment:
      AWG_GATEWAY: ${AWG_GATEWAY:-10.13.13.1}
    volumes:
      - ./worker-state/distributor:/worker-state/distributor:ro
    restart: unless-stopped

  xray:
    container_name: ${XRAY_CONTAINER_NAME:-worker-xray-1}
    build:
      context: xray
    depends_on:
      agent:
        condition: service_healthy
      distributor:
        condition: service_started
    volumes:
      - ./worker-state:/worker-state:ro
    ports:
      - "${XRAY_PORT:-2053}:8443/tcp"
    restart: unless-stopped

  awg-smoke:
    profiles: ["smoke"]
    build:
      context: .
      dockerfile: awg-smoke/Dockerfile
    depends_on:
      - awg-gw
      - distributor
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./worker-state:/worker-state
    environment:
      WORKER_STATE_DIR: /worker-state
      AWG_ENDPOINT: host.docker.internal:${AWG_PORT:-51888}
      AWG_GATEWAY: ${AWG_GATEWAY:-10.13.13.1}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  awg-run:
